<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đoàn Tuệ Minh — Học Tập & Sáng Tạo Học Thuật</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Hiệu ứng lật thẻ (Flip Card) */
    .flip-container {
      perspective: 1000px;
      width: 100%;
      height: 100%;
    }
    .flipper {
      transition: 0.8s;
      transform-style: preserve-3d;
      position: relative;
      width: 100%;
      height: 100%;
      animation: flip-auto 8s infinite; /* Tổng thời gian 8s cho 2 ảnh */
    }
    @keyframes flip-auto {
      0%, 45% { transform: rotateY(0deg); }
      50%, 95% { transform: rotateY(180deg); }
      100% { transform: rotateY(0deg); }
    }
    .front, .back {
      backface-visibility: hidden;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 9999px;
      overflow: hidden;
    }
    .back { transform: rotateY(180deg); }

    /* Các style cũ giữ nguyên */
    .bg-pastel-grid { background-image: radial-gradient(#fda4af22 1px, transparent 1px); background-size: 28px 28px; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-float-slow { animation: float 9s ease-in-out infinite; }
    .animate-pulse-soft { animation: pulseSoft 3s ease-in-out infinite; }
    @keyframes pulseSoft { 0%, 100% { opacity: 0.7; transform: scale(1.08); } 50% { opacity: 1; transform: scale(1.12); } }
  </style>
</head>

<body class="bg-[#fefdf8] text-stone-700 font-sans antialiased">
  
  <!-- Hero Section -->
  <section class="min-h-screen flex items-center bg-pastel-grid">
    <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      
      <!-- Nội dung giới thiệu -->
      <div>
        <h1 class="font-serif text-5xl text-stone-900 mb-6">Đoàn Tuệ Minh</h1>
        <p class="text-lg text-stone-600">Chào mừng đến với hồ sơ học thuật số.</p>
      </div>

      <!-- Avatar Flip Container -->
      <div class="flex justify-center">
        <div class="relative w-72 h-72 md:w-80 md:h-80">
          <div class="absolute inset-0 rounded-full border border-rose-100/60 scale-125"></div>
          <div class="absolute inset-0 rounded-full border border-dashed border-rose-200 animate-pulse-soft"></div>
          
          <!-- Badge giữ lại -->
          <div class="absolute -top-4 -right-2 bg-white px-3.5 py-2 rounded-2xl shadow-md border border-stone-100 animate-float z-20">
            <span class="text-xs font-bold text-stone-600">ULISer 🎒</span>
          </div>

          <!-- Flip Card -->
          <div class="flip-container w-full h-full">
            <div class="flipper w-full h-full">
              <!-- Mặt trước: Hình 1 -->
              <div class="front">
                <img src="Hình 1.jpg" alt="Đoàn Tuệ Minh 1" class="w-full h-full object-cover">
              </div>
              <!-- Mặt sau: Hình 2 -->
              <div class="back">
                <img src="Hình 2.jpg" alt="Đoàn Tuệ Minh 2" class="w-full h-full object-cover">
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </section>

</body>
</html>
